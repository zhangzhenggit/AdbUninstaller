<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Phone body filled -->
  <rect x="3.5" y="1" width="9" height="13" rx="1.5" fill="#4A9B6F" opacity="0.9"/>
  <rect x="4.5" y="2" width="7" height="9" rx="0.5" fill="#1E1E1E" opacity="0.6"/>
  <!-- Screen: red X / delete indicator -->
  <line x1="6" y1="4.5" x2="10" y2="8.5" stroke="#FF5555" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="10" y1="4.5" x2="6" y2="8.5" stroke="#FF5555" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Home button -->
  <circle cx="8" cy="12.2" r="0.8" fill="#CCCCCC"/>
</svg>
